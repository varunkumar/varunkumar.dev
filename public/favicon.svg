<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Browser frame -->
  <rect x="1" y="1" width="30" height="30" rx="4" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Chrome divider -->
  <line x1="1" y1="9" x2="31" y2="9" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Traffic lights -->
  <circle cx="5" cy="5" r="1.5" stroke="#f59e0b" stroke-width="1"/>
  <circle cx="9.5" cy="5" r="1.5" stroke="#f59e0b" stroke-width="1"/>
  <!-- Nav block -->
  <rect x="4" y="13" width="24" height="4" rx="1" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.75"/>
  <!-- Text lines -->
  <line x1="4" y1="21" x2="28" y2="21" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="4" y1="25" x2="20" y2="25" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
</svg>
