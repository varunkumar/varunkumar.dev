<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Varunkumar Nagarajan</title>
  <meta name="description" content="Software Engineer. Engineering Leader. Wildlife Photographer. Something's coming." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root[data-theme="dark"] {
      --bg: #0d0d0d;
      --text: #f0f0f0;
      --muted: #888888;
      --accent: #f59e0b;
      --border: rgba(255, 255, 255, 0.08);
    }
    :root[data-theme="light"] {
      --bg: #fafafa;
      --text: #0d0d0d;
      --muted: #666666;
      --accent: #d97706;
      --border: rgba(0, 0, 0, 0.08);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 2.5rem;
      height: 2.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: color 0.2s, border-color 0.2s;
    }

    .theme-toggle:hover {
      color: var(--text);
    }

    .theme-toggle .icon-sun { display: none; }
    .theme-toggle .icon-moon { display: block; }
    [data-theme="light"] .theme-toggle .icon-sun { display: block; }
    [data-theme="light"] .theme-toggle .icon-moon { display: none; }

    /* ── Main content ── */
    .content {
      max-width: 640px;
      width: 100%;
      text-align: left;
    }

    .coming-soon-label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .taglines {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      margin-bottom: 3rem;
    }

    .tagline {
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      color: var(--muted);
      font-weight: 400;
    }

    .tagline-secondary {
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Social links ── */
    .social {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      align-items: center;
    }

    .social a {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.15s;
    }

    .social a:hover {
      color: var(--accent);
    }

    .social svg {
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      .social { gap: 1rem; }
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    /* Builder SVG */
    .builder-svg {
      max-width: 260px;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.4s ease both;
    }

    .builder-svg [pathLength] {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
    }

    .builder-svg .s-frame { animation: draw 0.7s ease forwards 0.1s; }
    .builder-svg .s-div   { animation: draw 0.25s ease forwards 0.7s; }
    .builder-svg .s-dot1  { animation: draw 0.15s ease forwards 0.75s; }
    .builder-svg .s-dot2  { animation: draw 0.15s ease forwards 0.88s; }
    .builder-svg .s-dot3  { animation: draw 0.15s ease forwards 1.0s; }
    .builder-svg .s-url   { animation: draw 0.3s ease forwards 0.9s; }
    .builder-svg .s-hdr   { animation: draw 0.35s ease forwards 1.1s; }
    .builder-svg .s-ln1   { animation: draw 0.25s ease forwards 1.35s; }
    .builder-svg .s-ln2   { animation: draw 0.2s ease forwards 1.5s; }
    .builder-svg .s-ln3   { animation: draw 0.2s ease forwards 1.65s; }
    .builder-svg .s-img   { animation: draw 0.3s ease forwards 1.8s; }
    .builder-svg .s-c1    { animation: draw 0.2s ease forwards 2.0s; }
    .builder-svg .s-c2    { animation: draw 0.2s ease forwards 2.15s; }

    /* ── Profile photo ── */
    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 2px solid var(--border);
      margin-bottom: 1.75rem;
      display: block;
      animation: fadeUp 0.5s ease both 0.3s;
    }

    .coming-soon-label { animation: fadeUp 0.5s ease both 0.45s; }
    .coming-soon-label::after {
      content: '_';
      margin-left: 1px;
      animation: blink 1s step-end infinite;
    }

    h1          { animation: fadeUp 0.5s ease both 0.45s; }
    .taglines   { animation: fadeUp 0.5s ease both 0.6s; }
    .social     { animation: fadeUp 0.5s ease both 0.75s; }

    @media (prefers-reduced-motion: reduce) {
      .builder-svg, .avatar, .coming-soon-label, h1, .taglines, .social { animation: none; opacity: 1; }
      .coming-soon-label::after { animation: none; }
      .builder-svg [pathLength] { stroke-dashoffset: 0; }
    }
  </style>
  <script>
    (function(){
      var s = localStorage.getItem('theme');
      if (s === 'light' || s === 'dark') {
        document.documentElement.setAttribute('data-theme', s);
      } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>

      <!-- Image placeholder -->
      <rect class="s-img" x="10" y="100" width="68" height="44" rx="2"
            pathLength="100" stroke-width="1" stroke-opacity="0.6"/>
      <!-- Content cards -->

    </svg>

    <p class="coming-soon-label">Coming soon</p>

    <h1>Varunkumar<br>Nagarajan</h1>

    <div class="taglines">

  </main>

  <script>
    document.getElementById('themeToggle').addEventListener('click', function () {
      var html = document.documentElement;
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>

</body>
</html>
